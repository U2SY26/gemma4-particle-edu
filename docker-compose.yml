version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: gemma4-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-pull:
    image: ollama/ollama:latest
    container_name: gemma4-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull gemma4:latest && echo 'Model ready'"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

  app:
    build: .
    container_name: gemma4-particle-edu
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE=http://ollama:11434
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  ollama-data:
