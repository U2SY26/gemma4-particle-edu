                    - listitem [ref=e289]: Media Gallery
              - paragraph [ref=e290]:
                - strong [ref=e291]: Your final Submission must be made prior to the deadline. Any un-submitted or draft Writeups by the hackathon deadline will not be considered by the Judges.
              - paragraph [ref=e292]:
                - text: To create a new Writeup, click on the "New Writeup" button
                - link "here (opens in a new tab)" [ref=e293] [cursor=pointer]:
                  - /url: https://www.kaggle.com/competitions/gemma-4-good-hackathon/projects
                  - text: here
                - text: . After you have saved your Writeup, you should see a "Submit" button in the top right corner.
              - paragraph [ref=e294]: Each team is limited to submitting only a single Writeup, but that same Writeup can be un-submitted, edited, and re-submitted as many times as you'd like. Your Writeup should contain a summary of your overall project along with links to supporting resources.
              - paragraph [ref=e295]: "Note: If you attach a private Kaggle Resource to your public Kaggle Writeup, your private Resource will automatically be made public after the deadline."
              - heading "1. Kaggle Writeup" [level=3] [ref=e296]
              - paragraph [ref=e297]: The Proof of Work. This paper- or blog-style report is your technical verification. It must clearly explain the architecture of your app, how you specifically used Gemma 4, the challenges you overcame, and why your technical choices were the right ones. Its primary purpose is to prove to the judges that your video demo is backed by real engineering.
              - paragraph [ref=e298]: The Kaggle Writeup serves as your project report. This should include a title, subtitle, and a detailed analysis of your submission. You must select a Track for your Writeup in order to submit.
              - paragraph [ref=e299]: Your Writeup should not exceed 1,500 words. Submissions over this limit may be subject to penalty.
              - paragraph [ref=e300]: The below assets must be attached to the Writeup to be eligible.
              - heading "a. Video" [level=4] [ref=e301]
              - paragraph [ref=e302]: Attach your video to the Media Gallery. Videos must be 3 minutes or less, and should be published to YouTube. This is the most important part of your submission. Create a dynamic, engaging, and high-quality video that demonstrates your project in action.
              - list [ref=e303]:
                - listitem [ref=e304]: "Your Goal: Tell a story. Show us the problem and how your Gemma 4 app solves it in a powerful way."
                - listitem [ref=e305]: "Format: You have to post your video on YouTube and provide a direct link to the video. It must be viewable by the judges without requiring a login."
              - heading "b. Public Code Repository" [level=4] [ref=e306]
              - paragraph [ref=e307]: The "Source of Truth". Provide a link to a public repository (e.g., GitHub, Kaggle Notebook). The code must be well-documented and clearly show the implementation of Gemma 4. This is non-negotiable and will be used to validate the authenticity of your project. Your code repository should be publicly accessible and not require a login or paywall. If you use a private Kaggle Notebook, it will automatically be made public after the deadline.
              - paragraph [ref=e308]: You should provide a link to your public code in the section "Attachments" of your writeup, under "Project Links".
              - heading "c. Live Demo" [level=4] [ref=e309]
              - paragraph [ref=e310]: A URL or files for your working demo. This allows judges to experience your project firsthand, if applicable. It should be publicly accessible and not require a login or paywall.
              - list [ref=e311]:
                - listitem [ref=e312]: If you are providing a link, you can do so in the section "Attachments" of your writeup, under "Project Links".
                - listitem [ref=e313]: If you are providing files, you can do so in the section "Attachments" of your writeup, under "Files".
              - heading "d. Media Gallery" [level=4] [ref=e314]
              - paragraph [ref=e315]: This is where you should attach any images and/or videos associated with your submission. A cover image is required to submit your Writeup.
