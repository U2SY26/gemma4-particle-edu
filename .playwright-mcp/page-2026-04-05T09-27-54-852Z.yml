            - generic [ref=e241]:
              - paragraph [ref=e242]: Every challenge has a perfect match, and the clock is ticking. Real innovation happens when we build for the places that need it most. This might be a classroom with spotty internet, a medical site far from a data center, or a community where privacy is non-negotiable.
              - paragraph [ref=e243]:
                - text: With the release of
                - link "Gemma 4 (opens in a new tab)" [ref=e244] [cursor=pointer]:
                  - /url: https://www.kaggle.com/models/google/gemma-4
                  - text: Gemma 4
                - text: ", a new family of open models is officially in your hands. Leverage local frontier intelligence, native function calling, and multimodal understanding to tackle the issues that affect your community."
              - paragraph [ref=e245]: "We challenge you to use this groundbreaking technology to build solutions that create meaningful, positive change in the world. This is your opportunity to drive impact in areas like:"
              - list [ref=e246]:
                - listitem [ref=e247]:
                  - strong [ref=e248]: "Health & Sciences:"
                  - text: Bridge the gap between humans and data. Build tools that accelerate discovery or democratize knowledge.
                - listitem [ref=e249]:
                  - strong [ref=e250]: "Global Resilience:"
                  - text: Build the systems of tomorrow—from offline, edge-based disaster response to long-range climate mitigation—that anticipate, mitigate, and respond to the world’s most pressing challenges.
                - listitem [ref=e251]:
                  - strong [ref=e252]: "Future of Education:"
                  - text: Reimagine the learning journey by building multi-tool agents that adapt to the individual and empower the educator through seamless integration.
                - listitem [ref=e253]:
                  - strong [ref=e254]: "Digital Equity & Inclusivity:"
                  - text: Break down barriers through linguistic diversity, intuitive interfaces, and tools that help close the AI skills gap.
                - listitem [ref=e255]:
                  - strong [ref=e256]: "Safety & Trust:"
                  - text: Pioneer frameworks for transparency and reliability, ensuring AI remains grounded and explainable.
              - paragraph [ref=e257]: We want to see how you enhance Gemma 4 models through post-training, domain adaptation, and agentic retrieval to ensure accurate, grounded outputs. Whether you’re optimizing E2B and E4B models for edge-based solutions or deploying the 26B and 31B weights for complex tasks, every contribution pushes the boundaries of what AI can achieve.
              - paragraph [ref=e258]:
                - text: See the
                - link "naming guidelines (opens in a new tab)" [ref=e259] [cursor=pointer]:
                  - /url: https://ai.google/documents/32/External_Gemma_Model_Variant_Guidelines.pdf
                  - text: naming guidelines
                - text: for Gemma model variants and assets you can use in your submission videos.
              - list [ref=e260]:
                - listitem [ref=e261]: If training a model, publish your weights and benchmarks.
                - listitem [ref=e262]: If building an app, explain your architecture and demonstrate real-world utility via a functional demo.
              - paragraph [ref=e263]: This is more than just a competition; it is a chance to show the world that when the right tools are accessible to everyone, the possibilities for positive change are truly endless.
              - heading "Your Goal" [level=3] [ref=e264]
              - paragraph [ref=e265]:
                - strong [ref=e266]: Tell a story.
                - text: Show us the problem and how your Gemma 4 application solves it in a powerful way.
              - paragraph [ref=e267]:
                - text: We want to see the "wow" factor. While your technical execution is vital, the ability to communicate your vision through a compelling video and writeup is what will set the winners apart. Explore the
                - link "winners and finalists (opens in a new tab)" [ref=e268] [cursor=pointer]:
                  - /url: https://blog.google/innovation-and-ai/technology/developers-tools/developers-changing-lives-with-gemma-3n/
                  - text: winners and finalists
                - text: of the Gemma 3n Impact Challenge for examples of submissions that left the judges inspired.
