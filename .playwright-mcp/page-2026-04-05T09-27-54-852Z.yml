            - generic [ref=e281]:
              - paragraph [ref=e282]: "A valid submission must contain the following:"
              - list [ref=e283]:
                - listitem [ref=e284]:
                  - text: Kaggle Writeup
                  - list [ref=e285]:
                    - listitem [ref=e286]: Attached Public Video
                    - listitem [ref=e287]: Attached Public Code Repository
