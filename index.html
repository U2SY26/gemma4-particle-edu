<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free interactive 3D physics simulation education platform powered by Gemma 4 and Ollama">
  <meta name="color-scheme" content="dark">
  <title>Gemma 4 Particle Edu</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <!-- Mobile Tab Toggle -->
    <nav id="mobile-tabs" aria-label="Panel switcher">
      <button id="tab-chat" class="mobile-tab active" type="button" aria-pressed="true">
        <span data-i18n="tabs.chat">Chat</span>
      </button>
      <button id="tab-viewport" class="mobile-tab" type="button" aria-pressed="false">
        <span data-i18n="tabs.viewport">3D View</span>
      </button>
    </nav>

    <!-- Left: Chat Panel -->
    <aside id="chat-panel" role="complementary">
      <header id="chat-header">
        <div class="header-top">
          <h1 data-i18n="chat.title">Gemma 4 Particle Edu</h1>
          <div class="header-controls">
            <button id="locale-toggle" type="button" aria-label="Toggle language">
              <span data-i18n="locale.label">KO</span>
            </button>
            <div id="status-indicator" title="Ollama disconnected" aria-label="Ollama connection status">
              <span class="status-dot disconnected"></span>
              <span class="status-text" data-i18n="status.disconnected">Disconnected</span>
            </div>
          </div>
        </div>
      </header>

      <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Messages injected by app.js -->
        <!-- Example structure:
        <div class="message message-ai">
          <div class="message-content">...</div>
        </div>
        <div class="message message-user">
          <div class="message-content">...</div>
        </div>
        -->
      </div>

      <!-- Typing indicator (hidden by default) -->
      <div id="typing-indicator" class="message message-ai" hidden>
        <div class="message-content">
          <span class="typing-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        </div>
      </div>

      <!-- Preset Buttons -->
      <div id="preset-area" role="group" aria-label="Simulation presets">
        <button class="preset-btn" type="button" data-preset="earthquake">
          <span data-i18n="preset.earthquake">Earthquake</span>
        </button>
        <button class="preset-btn" type="button" data-preset="bridge">
          <span data-i18n="preset.bridge">Bridge</span>
        </button>
        <button class="preset-btn" type="button" data-preset="freefall">
          <span data-i18n="preset.freefall">Free Fall</span>
        </button>
      </div>

      <!-- Chat Input -->
      <form id="chat-form" autocomplete="off">
        <label for="chat-input" class="sr-only" data-i18n="chat.inputLabel">Type a message</label>
        <input
          type="text"
          id="chat-input"
          data-i18n-placeholder="chat.placeholder"
          placeholder="Ask about physics simulations..."
          autocomplete="off"
          spellcheck="true"
        >
        <button type="submit" id="chat-send" aria-label="Send message" data-i18n-aria="chat.send">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M3 10L17 3L10 17L9 11L3 10Z" fill="currentColor"/>
          </svg>
        </button>
      </form>
    </aside>

    <!-- Resize Divider -->
    <div id="resize-divider" role="separator" aria-orientation="vertical" aria-label="Resize panels" tabindex="0"></div>

    <!-- Right: 3D Viewport -->
    <main id="viewport" role="main">
      <canvas id="render-canvas" aria-label="3D physics simulation viewport"></canvas>

      <div id="viewport-overlay">
        <!-- Top-right controls -->
        <div id="viewport-controls" role="toolbar" aria-label="Simulation controls">
          <button id="btn-play" type="button" aria-label="Play simulation" data-i18n-aria="controls.play">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M4 2L16 9L4 16V2Z" fill="currentColor"/>
            </svg>
          </button>
          <button id="btn-pause" type="button" aria-label="Pause simulation" data-i18n-aria="controls.pause">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <rect x="3" y="2" width="4" height="14" fill="currentColor"/>
              <rect x="11" y="2" width="4" height="14" fill="currentColor"/>
            </svg>
          </button>
          <button id="btn-reset" type="button" aria-label="Reset simulation" data-i18n-aria="controls.reset">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M3 9A6 6 0 1 1 9 15" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M1 6L3 9L6 7" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
          </button>
          <span class="control-divider" aria-hidden="true"></span>
          <button id="btn-vr" type="button" aria-label="Enter VR mode" data-i18n-aria="controls.vr">
            <span data-i18n="controls.vr">VR</span>
          </button>
          <span class="control-divider" aria-hidden="true"></span>
          <label class="bloom-control" for="bloom-slider">
            <span data-i18n="controls.bloom">Bloom</span>
            <input
              type="range"
              id="bloom-slider"
              min="0"
              max="3"
              step="0.1"
              value="1.5"
              aria-label="Bloom intensity"
            >
          </label>
        </div>

        <!-- Parameter Panel (collapsible) -->
        <div id="param-panel" aria-label="Simulation parameters">
          <button id="param-toggle" type="button" aria-expanded="false" aria-controls="param-sliders">
            <span data-i18n="params.title">Parameters</span>
            <svg class="chevron" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M4 5L7 8L10 5" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
          <div id="param-sliders" class="param-sliders collapsed">
            <div class="param-group">
              <label for="param-gravity">
                <span data-i18n="params.gravity">Gravity</span>
                <output id="val-gravity">-9.81</output>
                <span class="param-unit">m/s&sup2;</span>
              </label>
              <input type="range" id="param-gravity" min="-20" max="0" step="0.01" value="-9.81">
            </div>
            <div class="param-group">
              <label for="param-damping">
                <span data-i18n="params.damping">Damping</span>
                <output id="val-damping">0.97</output>
              </label>
              <input type="range" id="param-damping" min="0" max="1" step="0.01" value="0.97">
            </div>
            <div class="param-group">
              <label for="param-stiffness">
                <span data-i18n="params.stiffness">Stiffness</span>
                <output id="val-stiffness">5000</output>
                <span class="param-unit">N/m</span>
              </label>
              <input type="range" id="param-stiffness" min="100" max="50000" step="100" value="5000">
            </div>
            <div class="param-group">
              <label for="param-temperature">
                <span data-i18n="params.temperature">Temperature</span>
                <output id="val-temperature">293</output>
                <span class="param-unit">K</span>
              </label>
              <input type="range" id="param-temperature" min="100" max="2000" step="1" value="293">
            </div>
            <div class="param-group">
              <label for="param-seismic">
                <span data-i18n="params.seismic">Seismic</span>
                <output id="val-seismic">0</output>
                <span class="param-unit">m/s&sup2;</span>
              </label>
              <input type="range" id="param-seismic" min="0" max="20" step="0.1" value="0">
            </div>
            <div class="param-group">
              <label for="param-wind-x">
                <span data-i18n="params.windX">Wind X</span>
                <output id="val-wind-x">0</output>
                <span class="param-unit">m/s&sup2;</span>
              </label>
              <input type="range" id="param-wind-x" min="-10" max="10" step="0.1" value="0">
            </div>
          </div>
        </div>

        <!-- Stats Bar (bottom) -->
        <div id="stats-bar" role="status" aria-label="Simulation statistics">
          <span class="stat-item">
            <span class="stat-label" data-i18n="stats.fps">FPS</span>
            <span id="fps-counter" class="stat-value">0</span>
          </span>
          <span class="stat-item">
            <span class="stat-label" data-i18n="stats.particles">Particles</span>
            <span id="particle-count" class="stat-value">0</span>
          </span>
          <span class="stat-item">
            <span class="stat-label" data-i18n="stats.time">Time</span>
            <span id="sim-time" class="stat-value">0.00s</span>
          </span>
        </div>
      </div>
    </main>

  </div>

  <!-- Modules loaded by app.js -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
