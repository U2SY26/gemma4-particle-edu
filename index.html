<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemma 4 Particle Edu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Left: Chat Panel -->
    <aside id="chat-panel">
      <header id="chat-header">
        <h1>Gemma 4 Particle Edu</h1>
        <div id="status-indicator"></div>
      </header>
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input type="text" id="chat-input" autocomplete="off">
        <button type="submit" id="chat-send"></button>
      </form>
    </aside>

    <!-- Right: 3D Viewport -->
    <main id="viewport">
      <canvas id="render-canvas"></canvas>
      <div id="viewport-overlay">
        <div id="stats-bar"></div>
        <div id="param-panel"></div>
      </div>
    </main>
  </div>

  <!-- Modules loaded by app.js -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
